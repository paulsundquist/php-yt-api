<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTubie Fit</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #333;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .home-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: opacity 0.2s;
        }

        .home-btn:hover {
            opacity: 0.7;
        }

        .category-select {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }
        .category-select option {
            background: #1e3a5f;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #1a1a1a;
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .video-meta {
            font-size: 13px;
            color: #888;
            display: flex;
            gap: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #888;
        }

        .no-videos {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #888;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div style="display:flex;align-items:center;gap:8px">
                <a href="/" class="home-btn" title="Home"><img src="/favicon.svg" alt="Home" style="width:24px;height:24px;display:block"></a>
                <span style="color:#d946ef;font-size:28px;font-weight:800;">Fit</span>
            </div>
            <select class="category-select" id="category-select">
                <option value="all">All Workouts</option>
                <option value="Lift">Lift</option>
                <option value="Bike">Bike</option>
                <option value="Treadmill">Treadmill</option>
            </select>
            <select class="category-select" id="channel-select">
                <option value="all">All Instructors</option>
            </select>
            <select class="category-select" id="duration-select">
                <option value="all">Any Length</option>
                <option value="0-12">Up to 12 min</option>
                <option value="12-17">12–17 min</option>
                <option value="17-32">17–32 min</option>
                <option value="32-50">32–50 min</option>
                <option value="50+">50+ min</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div id="videos-container">
            <div class="loading">Loading videos...</div>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentDuration = 'all';
        let currentChannel = 'all';

        async function loadChannels() {
            try {
                const response = await fetch('/fit-channels');
                const data = await response.json();
                if (!data.success) return;
                const channelSelect = document.getElementById('channel-select');
                data.channels.forEach(ch => {
                    const opt = document.createElement('option');
                    opt.value = ch.channel_id;
                    opt.textContent = ch.channel_name;
                    channelSelect.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading channels:', e);
            }
        }

        async function loadVideos() {
            const container = document.getElementById('videos-container');
            container.innerHTML = '<div class="loading">Loading videos...</div>';

            const params = new URLSearchParams({ limit: 100 });
            if (currentCategory !== 'all') params.set('category', currentCategory);
            if (currentChannel !== 'all') params.set('channel_id', currentChannel);
            if (currentDuration !== 'all') {
                if (currentDuration === '50+') {
                    params.set('min_mins', 50);
                } else {
                    const [lo, hi] = currentDuration.split('-');
                    params.set('min_mins', lo);
                    params.set('max_mins', hi);
                }
            }

            try {
                const response = await fetch(`/fit-videos?${params}`);
                const data = await response.json();
                if (!data.success) throw new Error('Failed to fetch fitness videos');

                const videos = data.videos;
                if (videos.length === 0) {
                    container.innerHTML = '<div class="no-videos">No videos found for this category.</div>';
                    return;
                }

                const grid = document.createElement('div');
                grid.className = 'videos-grid';
                videos.forEach(video => grid.appendChild(createVideoCard(video)));
                container.innerHTML = '';
                container.appendChild(grid);
            } catch (error) {
                console.error('Error loading videos:', error);
                container.innerHTML = `<div class="error">Error loading videos: ${error.message}</div>`;
            }
        }

        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => window.open(`https://www.youtube.com/watch?v=${video.video_id}`, '_blank');

            const publishedDate = new Date(video.published_at);
            const timeAgo = getTimeAgo(publishedDate);

            card.innerHTML = `
                <img src="${video.thumbnail_url || 'https://img.youtube.com/vi/' + video.video_id + '/mqdefault.jpg'}"
                     alt="${escapeHtml(video.title)}"
                     class="video-thumbnail"
                     onerror="this.src='https://img.youtube.com/vi/${video.video_id}/mqdefault.jpg'">
                <div class="video-info">
                    <div class="video-title">${escapeHtml(video.title)}</div>
                    <div class="video-channel">${video.channel_name || video.category}</div>
                    <div class="video-meta" style="display:flex;justify-content:space-between;align-items:center">
                        <div>
                            <span>${formatViews(video.view_count)} views</span>
                            <span> · ${timeAgo}</span>
                        </div>
                        ${video.duration ? `<span style="color:#fff;font-weight:600;margin-left:auto">${parseDuration(video.duration)}</span>` : ''}
                    </div>
                </div>
            `;

            return card;
        }

        function durationToMinutes(iso) {
            if (!iso) return 0;
            const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return 0;
            return parseInt(m[1] || 0) * 60 + parseInt(m[2] || 0) + parseInt(m[3] || 0) / 60;
        }

        function parseDuration(iso) {
            const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return '';
            const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), s = parseInt(m[3] || 0);
            if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${min}:${String(s).padStart(2,'0')}`;
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);

            const intervals = {
                year: 31536000,
                month: 2592000,
                week: 604800,
                day: 86400,
                hour: 3600,
                minute: 60
            };

            for (const [unit, secondsInUnit] of Object.entries(intervals)) {
                const interval = Math.floor(seconds / secondsInUnit);
                if (interval >= 1) {
                    return `${interval} ${unit}${interval > 1 ? 's' : ''} ago`;
                }
            }

            return 'just now';
        }

        function formatViews(count) {
            if (count >= 1000000) {
                return (count / 1000000).toFixed(1) + 'M';
            } else if (count >= 1000) {
                return (count / 1000).toFixed(1) + 'K';
            }
            return count || '0';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Category dropdown handling
        document.getElementById('category-select').addEventListener('change', function() {
            currentCategory = this.value;
            loadVideos();
        });

        // Channel dropdown handling
        document.getElementById('channel-select').addEventListener('change', function() {
            currentChannel = this.value;
            loadVideos();
        });

        // Duration dropdown handling
        document.getElementById('duration-select').addEventListener('change', function() {
            currentDuration = this.value;
            loadVideos();
        });

        // Load channels and initial videos on page load
        loadChannels();
        loadVideos();
    </script>
</body>
</html>
